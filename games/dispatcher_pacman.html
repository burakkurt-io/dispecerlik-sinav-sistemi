<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dispeçer Kontrol Merkezi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #050a0f;
            color: #0ff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-top: 5px;
            margin-bottom: 5px;
            text-align: center;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            font-size: 28px;
        }

        .author {
            color: #0ff;
            font-size: 14px;
            text-shadow: 0 0 5px #0ff;
            margin-bottom: 5px;
        }

        p {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #aaa;
            text-align: center;
        }

        /* OYUN ALANI */
        #pacman {
            width: 342px;
            height: 440px;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.2), inset 0 0 10px rgba(0, 150, 255, 0.2);
            border: 2px solid #004488;
            border-radius: 10px;
            padding: 10px;
            margin: 0 auto;
            position: relative;
            z-index: 20;
        }

        /* CRT Scanline Efekti */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="scanlines"></div>
<h1>DİSPEÇER GPS AĞI</h1>
<div class="author">Coded by Burak Kurt</div>
<p>Kargoları topla, trafiğe takılma. <strong style="color:#ffcc00;">Toplam 4 Farklı Vardiya (Harita) mevcuttur.</strong></p>

<div id="pacman"></div>

<script>
var NONE        = 4,
    UP          = 3,
    LEFT        = 2,
    DOWN        = 1,
    RIGHT       = 11,
    WAITING     = 5,
    PAUSE       = 6,
    PLAYING     = 7,
    COUNTDOWN   = 8,
    EATEN_PAUSE = 9,
    DYING       = 10,
    Pacman      = {};

Pacman.FPS = 30;

Pacman.Ghost = function (game, map, colour) {
    var position  = null, direction = null, eatable = null, eaten = null, due = null;
    
    function getNewCoord(dir, current) { 
        var speed  = isVunerable() ? 1 : isHidden() ? 4 : 2,
            xSpeed = (dir === LEFT && -speed || dir === RIGHT && speed || 0),
            ySpeed = (dir === DOWN && speed || dir === UP && -speed || 0);
        return { "x": addBounded(current.x, xSpeed), "y": addBounded(current.y, ySpeed) };
    }

    function addBounded(x1, x2) { 
        var rem = x1 % 10, result = rem + x2;
        if (rem !== 0 && result > 10) return x1 + (10 - rem);
        else if(rem > 0 && result < 0) return x1 - rem;
        return x1 + x2;
    }
    
    function isVunerable() { return eatable !== null; }
    function isDangerous() { return eaten === null; }
    function isHidden() { return eatable === null && eaten !== null; }
    
    function getRandomDirection() {
        var moves = (direction === LEFT || direction === RIGHT) ? [UP, DOWN] : [LEFT, RIGHT];
        return moves[Math.floor(Math.random() * 2)];
    }
    
    function reset() {
        eaten = null; eatable = null;
        position = {"x": 90, "y": 80};
        direction = getRandomDirection();
        due = getRandomDirection();
    }
    
    function onWholeSquare(x) { return x % 10 === 0; }
    function oppositeDirection(dir) { return dir === LEFT && RIGHT || dir === RIGHT && LEFT || dir === UP && DOWN || UP; }
    function makeEatable() { direction = oppositeDirection(direction); eatable = game.getTick(); }
    function eat() { eatable = null; eaten = game.getTick(); }
    function pointToCoord(x) { return Math.round(x / 10); }

    function nextSquare(x, dir) {
        var rem = x % 10;
        if (rem === 0) return x; 
        else if (dir === RIGHT || dir === DOWN) return x + (10 - rem);
        else return x - rem;
    }

    function onGridSquare(pos) { return onWholeSquare(pos.y) && onWholeSquare(pos.x); }
    function secondsAgo(tick) { return (game.getTick() - tick) / Pacman.FPS; }

    function getColour() { 
        if (eatable) { 
            if (secondsAgo(eatable) > 5) return game.getTick() % 20 > 10 ? "#FFFFFF" : "#0000BB";
            else return "#0000BB";
        } else if(eaten) { 
            return "#222";
        } 
        return colour;
    }

    function draw(ctx) {
        var s = map.blockSize, top = (position.y/10) * s, left = (position.x/10) * s;
        if (eatable && secondsAgo(eatable) > 8) eatable = null;
        if (eaten && secondsAgo(eaten) > 3) eaten = null;
        
        var tl = left + s, base = top + s - 3, inc = s / 10;
        var high = game.getTick() % 10 > 5 ? 3  : -3, low  = game.getTick() % 10 > 5 ? -3 : 3;

        ctx.fillStyle = getColour();
        ctx.beginPath();
        ctx.moveTo(left, base);
        ctx.quadraticCurveTo(left, top, left + (s/2),  top);
        ctx.quadraticCurveTo(left + s, top, left+s,  base);
        ctx.quadraticCurveTo(tl-(inc*1), base+high, tl - (inc * 2),  base);
        ctx.quadraticCurveTo(tl-(inc*3), base+low, tl - (inc * 4),  base);
        ctx.quadraticCurveTo(tl-(inc*5), base+high, tl - (inc * 6),  base);
        ctx.quadraticCurveTo(tl-(inc*7), base+low, tl - (inc * 8),  base); 
        ctx.quadraticCurveTo(tl-(inc*9), base+high, tl - (inc * 10), base); 
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = "#FFF";
        ctx.arc(left + 6,top + 6, s / 6, 0, 300, false);
        ctx.arc((left + s) - 6,top + 6, s / 6, 0, 300, false);
        ctx.closePath();
        ctx.fill();

        var f = s / 12, off = {};
        off[RIGHT] = [f, 0]; off[LEFT]  = [-f, 0]; off[UP]    = [0, -f]; off[DOWN]  = [0, f];

        ctx.beginPath();
        ctx.fillStyle = "#000";
        ctx.arc(left+6+off[direction][0], top+6+off[direction][1], s / 15, 0, 300, false);
        ctx.arc((left+s)-6+off[direction][0], top+6+off[direction][1], s / 15, 0, 300, false);
        ctx.closePath();
        ctx.fill();
    }

    function pane(pos) {
        if (pos.y === 100 && pos.x >= 190 && direction === RIGHT) return {"y": 100, "x": -10};
        if (pos.y === 100 && pos.x <= -10 && direction === LEFT) return position = {"y": 100, "x": 190};
        return false;
    }
    
    function move(ctx) {
        var oldPos = position, onGrid = onGridSquare(position), npos = null;
        if (due !== direction) {
            npos = getNewCoord(due, position);
            if (onGrid && map.isFloorSpace({"y":pointToCoord(nextSquare(npos.y, due)), "x":pointToCoord(nextSquare(npos.x, due))})) {
                direction = due;
            } else npos = null;
        }
        if (npos === null) npos = getNewCoord(direction, position);
        
        if (onGrid && map.isWallSpace({ "y" : pointToCoord(nextSquare(npos.y, direction)), "x" : pointToCoord(nextSquare(npos.x, direction)) })) {
            due = getRandomDirection();            
            return move(ctx);
        }

        position = npos;        
        var tmp = pane(position);
        if (tmp) position = tmp;
        
        due = getRandomDirection();
        return { "new" : position, "old" : oldPos };
    }
    
    return { "eat": eat, "isVunerable": isVunerable, "isDangerous": isDangerous, "makeEatable": makeEatable, "reset": reset, "move": move, "draw": draw };
};

Pacman.User = function (game, map) {
    var position = null, direction = null, eaten = null, due = null, lives = null, score = 5, keyMap = {};
    
    keyMap[KEY.ARROW_LEFT]  = LEFT; keyMap[KEY.ARROW_UP]    = UP;
    keyMap[KEY.ARROW_RIGHT] = RIGHT; keyMap[KEY.ARROW_DOWN]  = DOWN;

    function addScore(nScore) { score += nScore; if (score >= 10000 && score - nScore < 10000) lives += 1; }
    function theScore() { return score; }
    function loseLife() { lives -= 1; }
    function getLives() { return lives; }
    function setLives(n) { lives = n; }

    function initUser() { score = 0; lives = 3; newLevel(); }
    function newLevel() { resetPosition(); eaten = 0; }
    function resetPosition() { position = {"x": 90, "y": 120}; direction = LEFT; due = LEFT; }
    function reset() { initUser(); resetPosition(); }
    
    function keyDown(e) {
        if (typeof keyMap[e.keyCode] !== "undefined") { 
            due = keyMap[e.keyCode]; e.preventDefault(); e.stopPropagation(); return false;
        } return true;
	}

    function getNewCoord(dir, current) {   
        return { "x": current.x + (dir === LEFT && -2 || dir === RIGHT && 2 || 0), "y": current.y + (dir === DOWN && 2 || dir === UP && -2 || 0) };
    }

    function onWholeSquare(x) { return x % 10 === 0; }
    function pointToCoord(x) { return Math.round(x/10); }
    function nextSquare(x, dir) { var rem = x % 10; if (rem === 0) return x; else if (dir === RIGHT || dir === DOWN) return x + (10 - rem); else return x - rem; }
    function next(pos, dir) { return { "y" : pointToCoord(nextSquare(pos.y, dir)), "x" : pointToCoord(nextSquare(pos.x, dir)) }; }
    function onGridSquare(pos) { return onWholeSquare(pos.y) && onWholeSquare(pos.x); }

    function isOnSamePlane(due, dir) { 
        return ((due === LEFT || due === RIGHT) && (dir === LEFT || dir === RIGHT)) || ((due === UP || due === DOWN) && (dir === UP || dir === DOWN));
    }

    function move(ctx) {
        var npos = null, nextWhole = null, oldPosition = position, block = null;
        if (due !== direction) {
            npos = getNewCoord(due, position);
            if (isOnSamePlane(due, direction) || (onGridSquare(position) && map.isFloorSpace(next(npos, due)))) direction = due;
            else npos = null;
        }

        if (npos === null) npos = getNewCoord(direction, position);
        if (onGridSquare(position) && map.isWallSpace(next(npos, direction))) direction = NONE;
        if (direction === NONE) return {"new" : position, "old" : position};
        
        if (npos.y === 100 && npos.x >= 190 && direction === RIGHT) npos = {"y": 100, "x": -10};
        if (npos.y === 100 && npos.x <= -12 && direction === LEFT) npos = {"y": 100, "x": 190};
        
        position = npos;        
        nextWhole = next(position, direction);
        block = map.block(nextWhole);        
        
        if ((isMidSquare(position.y) || isMidSquare(position.x)) && (block === Pacman.BISCUIT || block === Pacman.PILL)) {
            map.setBlock(nextWhole, Pacman.EMPTY);           
            addScore((block === Pacman.BISCUIT) ? 10 : 50);
            eaten += 1;
            
            // DİNAMİK KARGO HESAPLAMA (Eskiden 182 Sabitti)
            if (eaten === map.getTotalItems()) game.completedLevel();
            if (block === Pacman.PILL) game.eatenPill();
        }   
        return { "new" : position, "old" : oldPosition };
    }

    function isMidSquare(x) { var rem = x % 10; return rem > 3 || rem < 7; }

    function calcAngle(dir, pos) { 
        if (dir == RIGHT && (pos.x % 10 < 5)) return {"start":0.25, "end":1.75, "direction": false};
        else if (dir === DOWN && (pos.y % 10 < 5)) return {"start":0.75, "end":2.25, "direction": false};
        else if (dir === UP && (pos.y % 10 < 5)) return {"start":1.25, "end":1.75, "direction": true};
        else if (dir === LEFT && (pos.x % 10 < 5)) return {"start":0.75, "end":1.25, "direction": true};
        return {"start":0, "end":2, "direction": false};
    }

    function drawDead(ctx, amount) { 
        var size = map.blockSize, half = size / 2;
        if (amount >= 1) return;
        ctx.fillStyle = "#00FF00"; 
        ctx.beginPath();        
        ctx.moveTo(((position.x/10) * size) + half, ((position.y/10) * size) + half);
        ctx.arc(((position.x/10) * size) + half, ((position.y/10) * size) + half, half, 0, Math.PI * 2 * amount, true); 
        ctx.fill();    
    }

    function draw(ctx) { 
        var s = map.blockSize, angle = calcAngle(direction, position);
        ctx.fillStyle = "#00FF00"; 
        ctx.beginPath();        
        ctx.moveTo(((position.x/10) * s) + s / 2, ((position.y/10) * s) + s / 2);
        ctx.arc(((position.x/10) * s) + s / 2, ((position.y/10) * s) + s / 2, s / 2, Math.PI * angle.start, Math.PI * angle.end, angle.direction); 
        ctx.fill();    
    }
    
    initUser();
    return { "draw": draw, "drawDead": drawDead, "loseLife": loseLife, "getLives": getLives, "setLives": setLives, "score": score, "addScore": addScore, "theScore": theScore, "keyDown": keyDown, "move": move, "newLevel": newLevel, "reset": reset, "resetPosition": resetPosition };
};

Pacman.Map = function (size) {
    var height = null, width = null, blockSize = size, pillSize = 0, map = null, totalItems = 0;
    
    function withinBounds(y, x) { return y >= 0 && y < height && x >= 0 && x < width; }
    function isWall(pos) { return withinBounds(pos.y, pos.x) && map[pos.y][pos.x] === Pacman.WALL; }
    function isFloorSpace(pos) {
        if (!withinBounds(pos.y, pos.x)) return false;
        var peice = map[pos.y][pos.x];
        return peice === Pacman.EMPTY || peice === Pacman.BISCUIT || peice === Pacman.PILL;
    }
    
    // YENİ HOLOGRAFİK DUVAR ÇİZİM SİSTEMİ (Vektör yerine Grid tabanlı)
    function drawWall(ctx) {
        for (var i = 0; i < height; i += 1) {
            for (var j = 0; j < width; j += 1) {
                if (map[i][j] === Pacman.WALL) {
                    var x = j * blockSize;
                    var y = i * blockSize;
                    // Dış Çerçeve Neon Mavi
                    ctx.strokeStyle = "#0066FF";
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x + 1, y + 1, blockSize - 2, blockSize - 2);
                    // İç Dolgu Saydam Koyu Mavi
                    ctx.fillStyle = "rgba(0, 40, 100, 0.4)";
                    ctx.fillRect(x + 2, y + 2, blockSize - 4, blockSize - 4);
                }
            }
        }
    }
    
    // YENİ HARİTA SEÇİCİ ve KARGO HESAPLAYICI
    function reset(levelIndex) {       
        var mapIndex = ((levelIndex || 1) - 1) % Pacman.MAPS.length;
        map = Pacman.MAPS[mapIndex].clone();
        height = map.length; width  = map[0].length; 
        
        totalItems = 0;
        for(var i=0; i<height; i++){
            for(var j=0; j<width; j++){
                if(map[i][j] === Pacman.BISCUIT || map[i][j] === Pacman.PILL) {
                    totalItems++;
                }
            }
        }
    }

    function getTotalItems() { return totalItems; }
    function block(pos) { return map[pos.y][pos.x]; }
    function setBlock(pos, type) { map[pos.y][pos.x] = type; }

    function drawPills(ctx) { 
        if (++pillSize > 30) pillSize = 0;
        for (var i = 0; i < height; i += 1) {
		    for (var j = 0; j < width; j += 1) {
                if (map[i][j] === Pacman.PILL) {
                    ctx.beginPath();
                    ctx.fillStyle = "#000";
		            ctx.fillRect((j * blockSize), (i * blockSize), blockSize, blockSize);
                    ctx.fillStyle = "#FFF";
                    ctx.arc((j * blockSize) + blockSize / 2, (i * blockSize) + blockSize / 2, Math.abs(5 - (pillSize/3)), 0, Math.PI * 2, false); 
                    ctx.fill();
                    ctx.closePath();
                }
		    }
	    }
    }
    
    function draw(ctx) {
        var i, j, size = blockSize;
        ctx.fillStyle = "#000";
	    ctx.fillRect(0, 0, width * size, height * size);
        drawWall(ctx);
        for (i = 0; i < height; i += 1) {
		    for (j = 0; j < width; j += 1) drawBlock(i, j, ctx);
	    }
    }
    
    function drawBlock(y, x, ctx) {
        var layout = map[y][x];
        if (layout === Pacman.PILL) return;
        ctx.beginPath();
        if (layout === Pacman.EMPTY || layout === Pacman.BLOCK || layout === Pacman.BISCUIT) {
            ctx.fillStyle = "#000";
		    ctx.fillRect((x * blockSize), (y * blockSize), blockSize, blockSize);
            if (layout === Pacman.BISCUIT) {
                ctx.fillStyle = "#FFDD00"; 
		        ctx.fillRect((x * blockSize) + (blockSize / 2.5), (y * blockSize) + (blockSize / 2.5), blockSize / 6, blockSize / 6);
	        }
        }
        ctx.closePath();	 
    }

    return { "draw": draw, "drawBlock": drawBlock, "drawPills": drawPills, "block": block, "setBlock": setBlock, "reset": reset, "isWallSpace": isWall, "isFloorSpace": isFloorSpace, "height": height, "width": width, "blockSize": blockSize, "getTotalItems": getTotalItems };
};

Pacman.Audio = function(game) {
    var files = [], endEvents = [], progressEvents = [], playing = [];
    function load(name, path, cb) { 
        var f = files[name] = document.createElement("audio");
        var isLoaded = false;
        var onReady = function() {
            if(!isLoaded) { isLoaded = true; if(typeof cb === "function") cb(); }
        };
        f.addEventListener("canplaythrough", onReady, true);
        f.addEventListener("error", onReady, true); 
        f.setAttribute("preload", "true"); f.setAttribute("autobuffer", "true"); f.setAttribute("src", path);
        f.pause();        
        setTimeout(onReady, 1500); 
    }
    function disableSound() { for (var i = 0; i < playing.length; i++) { files[playing[i]].pause(); files[playing[i]].currentTime = 0; } playing = []; }
    function ended(name) { 
        var i, tmp = [], found = false;
        files[name].removeEventListener("ended", endEvents[name], true);
        for (i = 0; i < playing.length; i++) { if (!found && playing[i]) found = true; else tmp.push(playing[i]); }
        playing = tmp;
    }
    function play(name) { 
        if (!game.soundDisabled() && files[name]) {
            endEvents[name] = function() { ended(name); }; playing.push(name);
            files[name].addEventListener("ended", endEvents[name], true);
            var playPromise = files[name].play();
            if (playPromise !== undefined) playPromise.catch(function(error){});
        }
    }
    function pause() { for (var i = 0; i < playing.length; i++) files[playing[i]].pause(); }
    function resume() { for (var i = 0; i < playing.length; i++) files[playing[i]].play(); }
    return { "disableSound": disableSound, "load": load, "play": play, "pause": pause, "resume": resume };
};

var PACMAN = (function () {
    var state        = WAITING,
        audio        = null,
        ghosts       = [],
        ghostSpecs   = ["#FF0000", "#FF9900", "#0088FF", "#FF00FF"], 
        eatenCount   = 0,
        level        = 0,
        tick         = 0,
        ghostPos, userPos, 
        stateChanged = true,
        timerStart   = null,
        lastTime     = 0,
        ctx          = null,
        timer        = null,
        map          = null,
        user         = null,
        stored       = null,
        isDeadFinal  = false; 

    function getTick() { return tick; }
    function drawScore(text, position) {
        ctx.fillStyle = "#FFFFFF"; ctx.font = "12px monospace";
        ctx.fillText(text, (position["new"]["x"] / 10) * map.blockSize, ((position["new"]["y"] + 5) / 10) * map.blockSize);
    }
    function dialog(text) {
        ctx.fillStyle = "#00FF00"; ctx.font = "bold 16px monospace";
        ctx.textAlign = "center";
        ctx.fillText(text, (map.width * map.blockSize)/2, (map.height * 10) + 8);
        ctx.textAlign = "left";
    }

    function soundDisabled() { return localStorage["soundDisabled"] === "true"; }
    
    function startLevel() {        
        user.resetPosition();
        for (var i = 0; i < ghosts.length; i += 1) ghosts[i].reset();
        audio.play("start"); timerStart = tick; setState(COUNTDOWN);
    }    

    function startNewGame() {
        setState(WAITING);
        level = 1; user.reset(); map.reset(level); map.draw(ctx);
        startLevel();
    }

    function keyDown(e) {
        if(isDeadFinal) return true; 
        if (e.keyCode === KEY.N) startNewGame();
        else if (e.keyCode === KEY.S) { audio.disableSound(); localStorage["soundDisabled"] = !soundDisabled(); } 
        else if (e.keyCode === KEY.P && state === PAUSE) { audio.resume(); map.draw(ctx); setState(stored); } 
        else if (e.keyCode === KEY.P) { stored = state; setState(PAUSE); audio.pause(); map.draw(ctx); dialog("MOLA (PAUSED)"); } 
        else if (state !== PAUSE) { return user.keyDown(e); }
        return true;
    }    

    function triggerArcadeDeath() {
        isDeadFinal = true;
        ctx.fillStyle = "rgba(0, 10, 20, 0.85)";
        ctx.fillRect(0, 0, map.width * map.blockSize, (map.height * map.blockSize) + 30);
        ctx.fillStyle = "#00FF00"; ctx.font = "bold 20px monospace"; ctx.textAlign = "center";
        ctx.fillText("SEFER BASARISIZ!", (map.width * map.blockSize)/2, (map.height * map.blockSize)/2);
        ctx.font = "16px monospace";
        ctx.fillText("TELSİZ BEKLENİYOR...", (map.width * map.blockSize)/2, (map.height * map.blockSize)/2 + 30);
        ctx.textAlign = "left"; 
        window.parent.postMessage('ARCADE_DEATH', '*');
    }

    function triggerGameOverFinal() {
        isDeadFinal = true;
        ctx.fillStyle = "rgba(150, 0, 0, 0.9)";
        ctx.fillRect(0, 0, map.width * map.blockSize, (map.height * map.blockSize) + 30);
        ctx.fillStyle = "#FFF"; ctx.font = "bold 22px monospace"; ctx.textAlign = "center";
        ctx.fillText("İSİNE SON VERİLDİ!", (map.width * map.blockSize)/2, (map.height * map.blockSize)/2);
        ctx.font = "16px monospace";
        ctx.fillText("(GAME OVER)", (map.width * map.blockSize)/2, (map.height * map.blockSize)/2 + 30);
        ctx.textAlign = "left";
    }

    window.addEventListener('message', function(e) {
        if(e.data === 'REVIVE') { isDeadFinal = false; user.setLives(3); startLevel(); }
        if(e.data === 'GAME_OVER_FINAL') { triggerGameOverFinal(); }
    });

    function loseLife() {        
        setState(WAITING); user.loseLife();
        if (user.getLives() > 0) startLevel();
        else triggerArcadeDeath();
    }

    function setState(nState) { state = nState; stateChanged = true; }
    function collided(user, ghost) { return (Math.sqrt(Math.pow(ghost.x - user.x, 2) + Math.pow(ghost.y - user.y, 2))) < 10; }

    function drawFooter() {
        var topLeft = (map.height * map.blockSize), textBase = topLeft + 17;
        ctx.fillStyle = "#001122"; 
        ctx.fillRect(0, topLeft, (map.width * map.blockSize), 30);
        
        for (var i = 0, len = user.getLives(); i < len; i++) {
            ctx.fillStyle = "#00FF00"; 
            ctx.beginPath();
            ctx.moveTo(150 + (25 * i) + map.blockSize / 2, (topLeft+1) + map.blockSize / 2);
            ctx.arc(150 + (25 * i) + map.blockSize / 2, (topLeft+1) + map.blockSize / 2, map.blockSize / 2, Math.PI * 0.25, Math.PI * 1.75, false);
            ctx.fill();
        }

        ctx.fillStyle = !soundDisabled() ? "#00FF00" : "#FF0000";
        ctx.font = "bold 16px sans-serif";
        ctx.fillText("s", 10, textBase);

        ctx.fillStyle = "#00FF00";
        ctx.font      = "bold 13px monospace"; 
        ctx.fillText("Kargo: " + user.theScore(), 30, textBase); 
        ctx.fillText("Vardiya: " + (level === 0 ? 1 : level), 250, textBase); 
    }

    function redrawBlock(pos) { map.drawBlock(Math.floor(pos.y/10), Math.floor(pos.x/10), ctx); map.drawBlock(Math.ceil(pos.y/10), Math.ceil(pos.x/10), ctx); }

    function mainDraw() { 
        var diff, u, i, len, nScore;
        ghostPos = [];
        for (i = 0, len = ghosts.length; i < len; i += 1) ghostPos.push(ghosts[i].move(ctx));
        u = user.move(ctx);
        
        for (i = 0, len = ghosts.length; i < len; i += 1) redrawBlock(ghostPos[i].old);
        redrawBlock(u.old);
        
        for (i = 0, len = ghosts.length; i < len; i += 1) ghosts[i].draw(ctx);                     
        user.draw(ctx);
        userPos = u["new"];
        
        for (i = 0, len = ghosts.length; i < len; i += 1) {
            if (collided(userPos, ghostPos[i]["new"])) {
                if (ghosts[i].isVunerable()) { 
                    audio.play("eatghost"); ghosts[i].eat();
                    eatenCount += 1; nScore = eatenCount * 50;
                    drawScore(nScore, ghostPos[i]); user.addScore(nScore);                    
                    setState(EATEN_PAUSE); timerStart = tick;
                } else if (ghosts[i].isDangerous()) {
                    audio.play("die"); setState(DYING); timerStart = tick;
                }
            }
        }                             
    }

    function mainLoop() {
        if(isDeadFinal) return; 

        var diff;
        if (state !== PAUSE) ++tick;
        map.drawPills(ctx);

        if (state === PLAYING) {
            mainDraw();
        } else if (state === WAITING && stateChanged) {            
            stateChanged = false; map.draw(ctx);
            dialog("Yeni sefer icin N'ye bas"); 
            // Alt Bilgilendirme Eklendi
            ctx.font = "12px monospace"; ctx.fillStyle = "#0ff"; ctx.textAlign = "center";
            ctx.fillText("4 Farklı Harita (Vardiya) Bulunur", (map.width * map.blockSize)/2, (map.height * map.blockSize)/2 + 40);
            ctx.textAlign = "left";
        } else if (state === EATEN_PAUSE && (tick - timerStart) > (Pacman.FPS / 3)) {
            map.draw(ctx); setState(PLAYING);
        } else if (state === DYING) {
            if (tick - timerStart > (Pacman.FPS * 2)) loseLife();
            else { 
                redrawBlock(userPos);
                for (var i = 0, len = ghosts.length; i < len; i += 1) { redrawBlock(ghostPos[i].old); ghostPos.push(ghosts[i].draw(ctx)); }                                   
                user.drawDead(ctx, (tick - timerStart) / (Pacman.FPS * 2));
            }
        } else if (state === COUNTDOWN) {
            diff = 5 + Math.floor((timerStart - tick) / Pacman.FPS);
            if (diff === 0) { map.draw(ctx); setState(PLAYING); } 
            else { if (diff !== lastTime) { lastTime = diff; map.draw(ctx); dialog("Sefer basliyor: " + diff); } }
        } 
        drawFooter();
    }

    function eatenPill() { audio.play("eatpill"); timerStart = tick; eatenCount = 0; for (var i = 0; i < ghosts.length; i += 1) ghosts[i].makeEatable(ctx); }
    
    // Level tamamlanınca yeni haritaya geçiş
    function completedLevel() { setState(WAITING); level += 1; map.reset(level); user.newLevel(); startLevel(); }
    function keyPress(e) { if (state !== WAITING && state !== PAUSE) { e.preventDefault(); e.stopPropagation(); } }
    
    function init(wrapper, root) {
        var i, len, ghost, blockSize = wrapper.offsetWidth / 19, canvas = document.createElement("canvas");
        canvas.setAttribute("width", (blockSize * 19) + "px"); canvas.setAttribute("height", (blockSize * 22) + 30 + "px");
        wrapper.appendChild(canvas); ctx  = canvas.getContext('2d');

        audio = new Pacman.Audio({"soundDisabled":soundDisabled});
        map   = new Pacman.Map(blockSize);
        map.reset(1); // İlk Harita
        user  = new Pacman.User({ "completedLevel" : completedLevel, "eatenPill" : eatenPill }, map);

        for (i = 0, len = ghostSpecs.length; i < len; i += 1) {
            ghost = new Pacman.Ghost({"getTick":getTick}, map, ghostSpecs[i]); ghosts.push(ghost);
        }
        
        map.draw(ctx); dialog("Yükleniyor...");

        var extension = 'mp3'; 
        var audio_files = [
            ["start", root + "audio/opening_song." + extension],
            ["die", root + "audio/die." + extension],
            ["eatghost", root + "audio/eatghost." + extension],
            ["eatpill", root + "audio/eatpill." + extension]
        ];
        load(audio_files, function() { loaded(); });
    }

    function load(arr, callback) { if (arr.length === 0) callback(); else { var x = arr.pop(); audio.load(x[0], x[1], function() { load(arr, callback); }); } }
        
    function loaded() {
        dialog("Başlamak için N'ye bas"); 
        document.addEventListener("keydown", keyDown, true); document.addEventListener("keypress", keyPress, true); 
        timer = window.setInterval(mainLoop, 1000 / Pacman.FPS);
    }
    
    return { "init" : init };
}());

        if (i === 'clone') continue;

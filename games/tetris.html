<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #202028; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; }
    canvas { border: solid 2px #444; background: #111; max-height: 90vh; max-width: 100vw; }
    #score-board { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #ffc107; }
  </style>
</head>
<body>
  <div id="score-board">YUKLENEN KARGO: <span id="score">0</span></div>
  <canvas id="tetris" width="240" height="400"></canvas>
  <script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(20, 20);

    let isDead = false;
    let waitingRevive = false;

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 10;
            rowCount *= 2;
        }
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function createPiece(type) {
        if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
        if (type === 'O') return [[2, 2], [2, 2]];
        if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
        if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
        if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
    }

    function draw() {
        context.fillStyle = '#111';
        context.fillRect(0, 0, canvas.width, canvas.height);
        if(!isDead && !waitingRevive) {
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        } else if (waitingRevive) {
            context.fillStyle = "rgba(0,0,0,0.8)"; context.fillRect(0,0,canvas.width,canvas.height);
            context.fillStyle = "white"; context.font = "1px Arial";
            context.fillText("KULE BEKLENIYOR...", 1, 10);
        } else {
            context.fillStyle = "rgba(220,53,69,0.9)"; context.fillRect(0,0,canvas.width,canvas.height);
            context.fillStyle = "white"; context.font = "1px Arial";
            context.fillText("KARGO DUSTU!", 2, 10);
        }
    }

    const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function die() {
        waitingRevive = true;
        window.parent.postMessage('ARCADE_DEATH', '*');
    }

    function playerDrop() {
        if(waitingRevive || isDead) return;
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        if(waitingRevive || isDead) return;
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            die();
        }
    }

    function playerRotate(dir) {
        if(waitingRevive || isDead) return;
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) { matrix.forEach(row => row.reverse()); } else { matrix.reverse(); }
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;
        if(!isDead && !waitingRevive) {
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
        }
        draw();
        requestAnimationFrame(update);
    }

    function updateScore() { document.getElementById('score').innerText = player.score; }

    const arena = createMatrix(12, 20);
    const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 81) playerRotate(-1);
        else if (event.keyCode === 38 || event.keyCode === 87) playerRotate(1);
    });

    window.addEventListener('message', (e) => {
        if(e.data === 'REVIVE') { 
            isDead = false; waitingRevive = false; 
            // Dirildiginde son 5 satiri temizle (kucuk bir yardim)
            for(let y=0; y<5; y++) { arena.shift(); arena.push(new Array(12).fill(0)); }
            playerReset(); 
        }
        if(e.data === 'GAME_OVER_FINAL') { isDead = true; waitingRevive = false; }
    });

    playerReset();
    updateScore();
    update();
  </script>
</body>
</html>

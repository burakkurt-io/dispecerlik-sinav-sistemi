<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Airspace Defense (Radar Command)</title>
    <style>
        body {
            margin: 0;
            background: #020a02;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            color: #0f0;
        }
        canvas {
            display: block;
            cursor: crosshair;
            background: radial-gradient(circle at center, #001a00 0%, #000500 100%);
        }
        /* CRT Ekran Çizgileri ve Parlama Efekti */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            box-shadow: 0 0 150px rgba(0,0,0,0.9) inset;
            pointer-events: none;
            z-index: 11;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 20px;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>
<div id="ui">
    <h2 style="margin:0; text-shadow: 0 0 8px #0f0;">RADAR COMMAND</h2>
    <div style="font-size:18px; text-shadow: 0 0 5px #0f0;">KORUNAN SEFERLER: <span id="score">0</span></div>
</div>
<div class="scanlines"></div>
<div class="vignette"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const context = canvas.getContext('2d');

let w, h, groundY, cityWidth, cityHeight;
let isDead = false;
let waitingRevive = false;
let score = 0;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    groundY = h - 60;
    cityWidth = w * 0.04;
    cityHeight = 20;
    initLevel();
}
window.addEventListener('resize', resize);

const missileSize = 8;
const counterMissileSize = 6;
let baseMissileSpeed = 1.5;
const counterMissileSpeed = 18; 

let missiles = [];
let counterMissiles = [];
let explosions = [];
let cities = [];
let silos = [];
let missileSpawns = [];

// Yeni düşman dizileri
let bombers = [];
let drones = [];

// Sürekli ateş için değişkenler
let isFiring = false;
let mouseX = 0, mouseY = 0;
let lastFireTime = 0;
const FIRE_RATE = 150; 

function initLevel() {
    cities = [
        { x: w * 0.20, y: groundY - cityHeight, alive: true },
        { x: w * 0.30, y: groundY - cityHeight, alive: true },
        { x: w * 0.40, y: groundY - cityHeight, alive: true },
        { x: w * 0.60, y: groundY - cityHeight, alive: true },
        { x: w * 0.70, y: groundY - cityHeight, alive: true },
        { x: w * 0.80, y: groundY - cityHeight, alive: true }
    ];

    silos = [
        { x: w * 0.08, y: groundY - 20, alive: true }, // Sol
        { x: w * 0.50, y: groundY - 20, alive: true }, // Orta
        { x: w * 0.92, y: groundY - 20, alive: true }  // Sağ
    ];

    missileSpawns = cities.concat(silos).concat([{ x: 0, y: 0 }, { x: w, y: 0 }]).map(pos => ({ x: pos.x, y: 0 }));
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function distance(source, target) { return Math.hypot(source.x - target.x, source.y - target.y); }
function angleBetweenPoints(source, target) { return Math.atan2(target.y - source.y, target.x - source.x) + Math.PI / 2; }

function spawnMissile(startX = null, startY = null) {
    const targets = cities.concat(silos).filter(t => t.alive);
    if(targets.length === 0) return;

    const start = startX !== null ? { x: startX, y: startY } : missileSpawns[randInt(0, missileSpawns.length - 1)];
    const target = targets[randInt(0, targets.length - 1)];
    const angle = angleBetweenPoints(start, target);
    
    // Rastgele Hız (Zorluk Artışı İçin)
    const randomSpeed = baseMissileSpeed * (0.8 + Math.random() * 0.8);

    missiles.push({
        start, target, pos: { x: start.x, y: start.y }, alive: true,
        dx: randomSpeed * Math.sin(angle), dy: randomSpeed * -Math.cos(angle)
    });
}

// Bombardıman Uçağı (Yatay uçar ve füze bırakır)
function spawnBomber() {
    const y = randInt(20, h * 0.25);
    const dir = Math.random() > 0.5 ? 1 : -1;
    const x = dir === 1 ? -50 : w + 50;
    const speed = randInt(1, 3);
    bombers.push({ x, y, dx: dir * speed, alive: true, dropTimer: 0 });
}

// Drone (Zigzag çizerek hızlı düşer)
function spawnDrone() {
    const startX = randInt(50, w - 50);
    const speed = baseMissileSpeed * (1.5 + Math.random());
    drones.push({
        x: startX, y: 0, baseY: 0, startX: startX,
        alive: true, speed: speed, offsetAngle: Math.random() * Math.PI * 2
    });
}

function updateScore(points) {
    score += points;
    document.getElementById('score').innerText = score;
}

function resetGame() {
    isDead = false; waitingRevive = false; score = 0; baseMissileSpeed = 1.5;
    updateScore(0);
    missiles = []; counterMissiles = []; explosions = []; 
    bombers = []; drones = []; // Yeni düşmanları temizle
    isFiring = false;
    resize();
    lastTime = performance.now();
    loop(lastTime);
}

// Fare Kontrolleri
canvas.addEventListener('mousedown', e => {
    if(isDead || waitingRevive) return;
    isFiring = true;
    mouseX = e.clientX - e.target.offsetLeft;
    mouseY = e.clientY - e.target.offsetTop;
});

canvas.addEventListener('mousemove', e => {
    mouseX = e.clientX - e.target.offsetLeft;
    mouseY = e.clientY - e.target.offsetTop;
});

canvas.addEventListener('mouseup', () => isFiring = false);
canvas.addEventListener('mouseleave', () => isFiring = false);

let lastTime = performance.now();
let spawnInterval = 2000;

function loop(time) {
    if(isDead || waitingRevive) return;
    requestAnimationFrame(loop);
    
    context.fillStyle = 'rgba(0, 15, 0, 0.3)';
    context.fillRect(0, 0, w, h);

    // Sürekli Ateş Kontrolü ve 15px Sağ/Sol Ayarı
    if (isFiring && (time - lastFireTime > FIRE_RATE)) {
        silos.forEach((silo, index) => {
            if (silo.alive) {
                const start = { x: silo.x, y: silo.y };
                let targetX = mouseX;
                
                // 0: Sol Silo, 1: Orta Silo, 2: Sağ Silo
                if (index === 0) targetX -= 15;
                if (index === 2) targetX += 15;
                
                const target = { x: targetX, y: mouseY };
                const angle = angleBetweenPoints(start, target);
                counterMissiles.push({
                    start, target, pos: { x: silo.x, y: silo.y},
                    dx: counterMissileSpeed * Math.sin(angle), dy: counterMissileSpeed * -Math.cos(angle), alive: true
                });
            }
        });
        lastFireTime = time;
    }

    // Düşman Spawn Zorluğu (Rastgeleleşti)
    if (time - lastTime > spawnInterval) {
        let spawnCount = 1 + Math.floor(score / 15);
        for(let i=0; i<spawnCount; i++) {
            let rnd = Math.random();
            if (rnd < 0.15) spawnBomber(); 
            else if (rnd < 0.35) spawnDrone(); 
            else spawnMissile(); 
        }
        lastTime = time;
        if(spawnInterval > 600) spawnInterval -= 30; // Zorluk daha hızlı artar
    }

    // Radar Tarama Çizgisi
    let radarAngle = (time / 1500) % (2 * Math.PI);
    context.save();
    context.translate(w/2, groundY);
    context.rotate(radarAngle);
    context.beginPath();
    context.moveTo(0, 0);
    context.lineTo(0, -w);
    context.strokeStyle = 'rgba(0, 255, 0, 0.4)';
    context.lineWidth = 2;
    context.stroke();
    context.restore();

    // Arka Plan Grid
    context.strokeStyle = 'rgba(0, 100, 0, 0.5)';
    context.lineWidth = 1;
    for(let i=0; i<h; i+=50) { context.beginPath(); context.moveTo(0, i); context.lineTo(w, i); context.stroke(); }
    for(let i=0; i<w; i+=50) { context.beginPath(); context.moveTo(i, 0); context.lineTo(i, h); context.stroke(); }

    // Zemin
    context.fillStyle = '#0a0';
    context.fillRect(0, groundY, w, h - groundY);
    context.strokeStyle = '#0f0';
    context.beginPath(); context.moveTo(0, groundY); context.lineTo(w, groundY); context.stroke();
    
    // Silolar
    silos.forEach(silo => {
        if(silo.alive) {
            context.fillStyle = '#0f0';
            context.beginPath(); context.moveTo(silo.x - 30, groundY);
            context.lineTo(silo.x - 15, silo.y); context.lineTo(silo.x + 15, silo.y);
            context.lineTo(silo.x + 30, groundY); context.fill();
            context.stroke();
            context.fillStyle = '#000';
            context.font = "bold 16px monospace";
            context.fillText("∞", silo.x - 6, silo.y + 16);
        }
    });

    // Şehirler
    context.fillStyle = '#0f0';
    let aliveCities = 0;
    cities.forEach(city => {
        if(city.alive) {
            aliveCities++;
            context.fillRect(city.x - cityWidth / 2, city.y, cityWidth, cityHeight);
            context.strokeRect(city.x - cityWidth / 2, city.y, cityWidth, cityHeight);
        }
    });

    if(aliveCities === 0) die();

    // DÜŞMAN BOMBARIMAN UÇAKLARI (Magenta)
    bombers.forEach(b => {
        b.x += b.dx;
        if (b.x < -100 || b.x > w + 100) b.alive = false;

        explosions.forEach(explosion => {
            if (distance(explosion, {x: b.x, y: b.y}) < 15 + explosion.size) {
                b.alive = false; updateScore(5);
                explosions.push({ x: b.x, y: b.y, size: 2, dir: 1, alive: true });
            }
        });

        if (b.alive) {
            b.dropTimer++;
            if (b.dropTimer > randInt(80, 180)) {
                spawnMissile(b.x, b.y);
                b.dropTimer = 0;
            }
            context.fillStyle = '#f0f';
            context.beginPath();
            context.moveTo(b.x + (b.dx > 0 ? 20 : -20), b.y);
            context.lineTo(b.x - (b.dx > 0 ? 15 : -15), b.y - 10);
            context.lineTo(b.x - (b.dx > 0 ? 15 : -15), b.y + 10);
            context.fill();
        }
    });

    // DÜŞMAN DRONELARI (Sarı)
    drones.forEach(d => {
        d.baseY += d.speed;
        d.y = d.baseY;
        d.x = d.startX + Math.sin(d.baseY / 40 + d.offsetAngle) * 60; // Zigzag Hareketi

        explosions.forEach(explosion => {
            if (distance(explosion, {x: d.x, y: d.y}) < 10 + explosion.size) {
                d.alive = false; updateScore(3);
                explosions.push({ x: d.x, y: d.y, size: 2, dir: 1, alive: true });
            }
        });

        // Yere veya şehre çarpma kontrolü
        if (d.y >= groundY - cityHeight) {
            d.alive = false;
            let targets = cities.concat(silos).filter(t => t.alive);
            targets.forEach(t => {
                if (distance(t, {x: d.x, y: d.y}) < 35) t.alive = false;
            });
            explosions.push({ x: d.x, y: d.y, size: 2, dir: 1, alive: true });
        }

        if (d.alive) {
            context.fillStyle = '#ff0';
            context.fillRect(d.x - 8, d.y - 2, 16, 4);
            context.fillRect(d.x - 2, d.y - 8, 4, 16);
        }
    });

    // DÜŞMAN FÜZELERİ (Kırmızı)
    context.strokeStyle = '#f00';
    context.lineWidth = 2;
    context.fillStyle = '#faa';

    missiles.forEach(missile => {
        missile.pos.x += missile.dx;
        missile.pos.y += missile.dy;

        explosions.forEach(explosion => {
            if (distance(explosion, missile.pos) < missileSize + explosion.size) {
                missile.alive = false; updateScore(1);
            }
        });

        counterMissiles.forEach(cm => {
            if(cm.alive && distance(missile.pos, cm.pos) < (missileSize + counterMissileSize)) {
                missile.alive = false;
                cm.alive = false;
                updateScore(1);
                explosions.push({ x: missile.pos.x, y: missile.pos.y, size: 2, dir: 1, alive: true });
            }
        });

        if (distance(missile.pos, missile.target) < baseMissileSpeed + 2) {
            missile.alive = false;
            missile.target.alive = false;
            explosions.push({ x: missile.pos.x, y: missile.pos.y, size: 2, dir: 1, alive: true });
        }

        if (missile.alive) {
            context.beginPath(); context.moveTo(missile.start.x, missile.start.y);
            context.lineTo(missile.pos.x, missile.pos.y); context.stroke();
            context.fillRect(missile.pos.x - missileSize / 2, missile.pos.y - missileSize / 2, missileSize, missileSize);
        }
    });

    // BİZİM FÜZELERİMİZ (Cyan/Açık Yeşil)
    context.strokeStyle = '#0ff';
    context.fillStyle = '#fff';
    context.lineWidth = 2;

    counterMissiles.forEach(missile => {
        missile.pos.x += missile.dx;
        missile.pos.y += missile.dy;

        if (distance(missile.pos, missile.target) < counterMissileSpeed) {
            missile.alive = false;
            explosions.push({ x: missile.pos.x, y: missile.pos.y, size: 2, dir: 1, alive: true });
        } else {
            context.beginPath(); context.moveTo(missile.start.x, missile.start.y);
            context.lineTo(missile.pos.x, missile.pos.y); context.stroke();
            context.fillRect(missile.pos.x - counterMissileSize/2, missile.pos.y - counterMissileSize/2, counterMissileSize, counterMissileSize);
        }
    });

    // PATLAMALAR (Radar Dalgaları)
    explosions.forEach(explosion => {
        explosion.size += 2.5 * explosion.dir; 
        
        // 1.5 KAT KÜÇÜLTÜLDÜ (160 yerine 106)
        if (explosion.size > 106) explosion.dir = -1; 
        
        if (explosion.size <= 0) explosion.alive = false;
        else {
            context.fillStyle = `rgba(0, 255, 100, ${0.4 * (explosion.size/106)})`; 
            context.strokeStyle = `rgba(0, 255, 100, ${1 - (explosion.size/106)})`;
            context.lineWidth = 2;
            context.beginPath(); 
            context.arc(explosion.x, explosion.y, explosion.size, 0, 2 * Math.PI); 
            context.fill();
            context.stroke();
        }
    });

    missiles = missiles.filter(m => m.alive);
    counterMissiles = counterMissiles.filter(m => m.alive);
    explosions = explosions.filter(e => e.alive);
    bombers = bombers.filter(b => b.alive);
    drones = drones.filter(d => d.alive);
}

function die() {
    waitingRevive = true;
    isFiring = false;
    context.fillStyle = "rgba(0, 10, 0, 0.9)"; context.fillRect(0,0,w,h);
    context.fillStyle = "#0f0"; context.font = "30px monospace"; context.textAlign = "center";
    context.fillText("TUM SEFERLER DUSTU! TELSİZ BEKLENİYOR...", w/2, h/2);
    window.parent.postMessage('ARCADE_DEATH', '*');
}

function drawGameOver() {
    context.fillStyle = "rgba(255, 0, 0, 0.9)"; context.fillRect(0,0,w,h);
    context.fillStyle = "#fff"; context.font = "40px monospace"; context.textAlign = "center";
    context.fillText("HAVA SAHASI KAYBEDILDI! (GAME OVER)", w/2, h/2);
}

window.addEventListener('message', (e) => {
    if(e.data === 'REVIVE') { 
        cities.forEach(c => c.alive = true);
        silos.forEach(s => s.alive = true);
        missiles = []; counterMissiles = []; explosions = [];
        bombers = []; drones = [];
        isDead = false; waitingRevive = false; isFiring = false;
        lastTime = performance.now();
        requestAnimationFrame(loop);
    }
    if(e.data === 'GAME_OVER_FINAL') { 
        isDead = true; waitingRevive = false; isFiring = false; drawGameOver(); 
    }
});

resize();
resetGame();
</script>
</body>
</html>
